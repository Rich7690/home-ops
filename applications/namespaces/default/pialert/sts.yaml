apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pialert
spec:
  selector:
    matchLabels:
      app: pialert
  serviceName: pialert
  replicas: 1
  podManagementPolicy: Parallel
  revisionHistoryLimit: 3
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: pialert
    spec:
      hostNetwork: true
      containers:
      - name: pialert
        image: jokobsk/pi.alert:24.10.31@sha256:120b1042f3d894944c5ba61b04c67be78b900516e608c7271652b1ab4c2c9e01
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
        env:
          - name: TZ
            value: America/Los_Angeles
          - name: PORT
            value: "20211"
        ports:
        - containerPort: 20211
          name: http
        volumeMounts:
        - name: pialert
          subPath: config
          mountPath: /home/pi/pialert/config
        - name: pialert
          subPath: db
          mountPath: /home/pi/pialert/db
  volumeClaimTemplates:
  - metadata:
      name: pialert
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
